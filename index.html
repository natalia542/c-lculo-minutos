<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKEA — Calculadora de Recursos</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAFAFA;font-family:'Poppins',sans-serif}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useEffect,useRef} = React;

/* ═══════════════════════════════════════════
   SUPABASE — Cambia estas dos líneas
   ═══════════════════════════════════════════ */
const SUPABASE_URL = "https://uiqktoskdpnvpysibgqm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpcWt0b3NrZHBudnB5c2liZ3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODc3MTQsImV4cCI6MjA5MzA2MzcxNH0.57fXlTos-fU9gAU6jtDI3UJhIb-Da9BoJvxD8PQ-9O4";
/* ═══════════════════════════════════════════ */

const sbEnabled = SUPABASE_URL !== "TU_URL_AQUI";
const sb = sbEnabled ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

/* ── Helpers ── */
const HP = 40;
function totalMin(a) {
  let t = a.bienvenida + a.pag_clase*7.5 + a.conclusion + a.complementarios;
  (a.units_data||[]).forEach(u => { t += u.orient+u.videoClase+u.infografia+u.biblio+u.formativo+u.sumativo; });
  return t + a.examen;
}
function tgt(a) { return (a.h_async+a.h_apoyo)*HP; }
function pct(a) { const g=tgt(a); return g>0?totalMin(a)/g*100:0; }

function mkUnits(n) {
  const u = [];
  for(let i=0;i<n;i++) u.push({orient:2,videoClase:12,infografia:12,biblio:0,formativo:15,sumativo:60});
  return u;
}

const FALLBACK = [
  {id:1,prog:"MBA",ciclo:1,nombre:"Taller de emprendimiento",uni:4,temas:8,h_async:15,h_apoyo:12,doc:"Vanessa Nowak",bienvenida:3,pag_clase:86,conclusion:2,complementarios:0,examen:60,units_data:mkUnits(4)},
  {id:2,prog:"MBA",ciclo:1,nombre:"Marketing y comportamiento del consumidor",uni:4,temas:8,h_async:15,h_apoyo:12,doc:"Luciana De Araujo",bienvenida:3,pag_clase:86,conclusion:2,complementarios:0,examen:60,units_data:mkUnits(4)},
];

/* ── Tiny components ── */
const PCOL = {MBA:"#0090F8",MCG:"#404040",MCEE:"#0090F8",OPT:"#666"};

const N = ({v,onChange,w=52,accent=false}) => (
  <input type="number" value={v} onChange={e=>onChange(Number(e.target.value)||0)}
    style={{width:w,border:"1px solid "+(accent?"#0090F8":"#ddd"),borderRadius:4,padding:"3px 4px",fontSize:12,textAlign:"right",background:accent?"#F0F8FF":"#fff",fontFamily:"inherit",fontWeight:accent?600:400}} />
);

const Tx = ({v,onChange,w=120}) => (
  <input type="text" value={v||""} onChange={e=>onChange(e.target.value)}
    style={{width:w,border:"1px solid #ddd",borderRadius:4,padding:"3px 6px",fontSize:12,fontFamily:"inherit"}} />
);

function Badge({p}) {
  const [bg,fg,lb] = p<95?["#FEE2E2","#991B1B","Bajo"]:p<=115?["#D1FAE5","#065F46","OK"]:["#FEF3C7","#92400E","Excede"];
  return <span style={{background:bg,color:fg,padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{lb} {p.toFixed(0)}%</span>;
}

function Bar({p}) {
  const c = p<95?"#EF4444":p<=115?"#0090F8":"#F59E0B";
  return (
    <div style={{height:6,background:"#EBECF0",borderRadius:3,position:"relative",margin:"4px 0"}}>
      <div style={{width:`${Math.min(p,130)/1.3}%`,height:"100%",background:c,borderRadius:3,transition:"width .3s"}} />
      <div style={{position:"absolute",left:`${100/1.3}%`,top:-2,width:2,height:10,background:"#2A2A2A",opacity:.25,borderRadius:1}} />
    </div>
  );
}

function Pill({prog}) {
  return <span style={{fontSize:9,color:"#fff",background:PCOL[prog]||"#888",borderRadius:3,padding:"2px 6px",fontWeight:700,whiteSpace:"nowrap"}}>{prog}</span>;
}

/* ═══ MAIN APP ═══ */
function App() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState(0);
  const [fProg, setFProg] = useState("Todos");
  const [fCiclo, setFCiclo] = useState("Todos");
  const [open, setOpen] = useState(null);
  const [saving, setSaving] = useState(false);
  const saveTimer = useRef(null);

  // Load from Supabase
  useEffect(() => {
    async function load() {
      if (!sb) { setData(FALLBACK); setLoading(false); return; }
      const {data:rows, error} = await sb.from("asignaturas").select("*").order("ciclo").order("prog").order("id");
      if (error || !rows?.length) { setData(FALLBACK); }
      else { setData(rows.map(r => ({...r, units_data: typeof r.units_data === "string" ? JSON.parse(r.units_data) : r.units_data || []}))); }
      setLoading(false);
    }
    load();
  }, []);

  // Auto-save to Supabase (debounced 1.5s)
  const saveToDb = useCallback(async (record) => {
    if (!sb) return;
    setSaving(true);
    const {id, created_at, ...rest} = record;
    await sb.from("asignaturas").update({...rest, updated_at: new Date().toISOString()}).eq("id", id);
    setSaving(false);
  }, []);

  const upd = useCallback((id, fn) => {
    setData(d => {
      const next = d.map(a => {
        if (a.id !== id) return a;
        const copy = {...a, units_data: [...(a.units_data||[]).map(u=>({...u}))]};
        return fn(copy);
      });
      const changed = next.find(a => a.id === id);
      if (changed && sb) {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => saveToDb(changed), 1500);
      }
      return next;
    });
  }, [saveToDb]);

  const filtered = useMemo(() => data.filter(a =>
    (fProg==="Todos"||a.prog===fProg) && (fCiclo==="Todos"||a.ciclo===Number(fCiclo))
  ), [data,fProg,fCiclo]);

  const progs = [...new Set(data.map(a=>a.prog))];
  const ciclos = [...new Set(data.map(a=>a.ciclo))].sort();

  if (loading) return <div style={{textAlign:"center",padding:80,color:"#999",fontSize:14}}>Cargando datos...</div>;

  const tabNames = ["Asignaturas","Minutos de consumo","Páginas contenidista","Costos"];

  return (
    <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 16px",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",border:"2.5px solid #0090F8",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:8,height:8,borderRadius:"50%",border:"2px solid #0090F8"}} />
          </div>
          <div>
            <span style={{fontSize:17,fontWeight:700,color:"#2A2A2A",letterSpacing:.5}}>HACK<span style={{color:"#0090F8"}}>EA</span></span>
            <span style={{fontSize:11,color:"#999",marginLeft:8}}>Calculadora de Recursos</span>
          </div>
        </div>
        <div style={{fontSize:11,color:saving?"#0090F8":"#ccc"}}>{saving ? "Guardando..." : sbEnabled ? "Conectado a Supabase" : "Modo local (sin persistencia)"}</div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"2px solid #EBECF0",marginBottom:16,overflowX:"auto"}}>
        {tabNames.map((t,i) => (
          <button key={i} onClick={()=>setTab(i)} style={{padding:"8px 18px",fontSize:12,fontWeight:tab===i?600:400,color:tab===i?"#0090F8":"#999",borderBottom:tab===i?"2px solid #0090F8":"2px solid transparent",background:"none",border:"none",cursor:"pointer",marginBottom:-2,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t}</button>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:10,marginBottom:16,fontSize:12,alignItems:"center",flexWrap:"wrap"}}>
        <select value={fProg} onChange={e=>setFProg(e.target.value)} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #ddd",fontSize:12,fontFamily:"inherit"}}>
          <option value="Todos">Todos</option>
          {progs.map(p=><option key={p}>{p}</option>)}
        </select>
        <select value={fCiclo} onChange={e=>setFCiclo(e.target.value)} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #ddd",fontSize:12,fontFamily:"inherit"}}>
          <option value="Todos">Todos</option>
          {ciclos.map(c=><option key={c} value={c}>Ciclo {c}</option>)}
        </select>
        <span style={{color:"#aaa",marginLeft:"auto"}}>{filtered.length} asignaturas</span>
      </div>

      {/* ═══ TAB 0: ASIGNATURAS ═══ */}
      {tab===0 && (
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #EBECF0",overflow:"hidden"}}>
          <div style={{padding:"14px 16px",background:"#F8F9FA",borderBottom:"1px solid #EBECF0"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#2A2A2A"}}>Asignaturas — Datos base</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>Edita horas, unidades y temas. Estos datos alimentan las demás vistas.</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#F8F9FA"}}>
                {["","Asignatura","Docente","Async H","Apoyo","Total Async","Unid","Temas","Pág CC","Pág/U","Pág/Tema","Min total","Estado"].map((h,i)=>(
                  <th key={i} style={{padding:"8px 8px",textAlign:i<3?"left":"right",fontWeight:600,color:"#666",fontSize:10,borderBottom:"1px solid #EBECF0",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.map(a => {
                  const asyncT = a.h_async + a.h_apoyo;
                  const pagTotalU = a.uni>0 ? (a.pag_clase/a.uni)+12+2.5 : 0;
                  const pagU = pagTotalU.toFixed(0);
                  const temasU = a.uni>0 ? a.temas/a.uni : 0;
                  const pagTema = temasU>0 ? (pagTotalU/temasU).toFixed(1) : 0;
                  const p = pct(a);
                  return (
                    <tr key={a.id} style={{borderBottom:"1px solid #F5F5F5"}}>
                      <td style={{padding:"6px 8px"}}><Pill prog={a.prog}/><br/><span style={{fontSize:9,color:"#bbb"}}>C{a.ciclo}</span></td>
                      <td style={{padding:"6px 8px",minWidth:180}}>
                        <div style={{fontWeight:500,color:"#2A2A2A"}}>{a.nombre}</div>
                      </td>
                      <td style={{padding:"4px 6px"}}><Tx v={a.doc} w={110} onChange={v=>upd(a.id,x=>{x.doc=v;return x;})} /></td>
                      <td style={{padding:"4px 4px"}}><N v={a.h_async} w={42} onChange={v=>upd(a.id,x=>{x.h_async=v;return x;})} /></td>
                      <td style={{padding:"4px 4px"}}><N v={a.h_apoyo} w={42} onChange={v=>upd(a.id,x=>{x.h_apoyo=v;return x;})} /></td>
                      <td style={{textAlign:"right",padding:"6px 8px",fontWeight:700,color:"#0090F8"}}>{asyncT}</td>
                      <td style={{padding:"4px 4px"}}><N v={a.uni} w={36} onChange={v=>upd(a.id,x=>{
                        const d=v-x.uni;
                        if(d>0) for(let i=0;i<d;i++) x.units_data.push({orient:2,videoClase:12,infografia:12,biblio:0,formativo:15,sumativo:60});
                        if(d<0) x.units_data=x.units_data.slice(0,v);
                        x.uni=v; return x;
                      })} /></td>
                      <td style={{padding:"4px 4px"}}><N v={a.temas} w={36} onChange={v=>upd(a.id,x=>{x.temas=v;return x;})} /></td>
                      <td style={{padding:"4px 4px"}}><N v={a.pag_clase} w={48} accent onChange={v=>upd(a.id,x=>{x.pag_clase=v;return x;})} /></td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{pagU}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{pagTema}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",fontWeight:600}}>{totalMin(a).toFixed(0)}</td>
                      <td style={{textAlign:"center",padding:"6px 4px"}}><Badge p={p} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ═══ TAB 1: MINUTOS ═══ */}
      {tab===1 && filtered.map(a => {
        const tm=totalMin(a), tg2=tgt(a), p=pct(a), isO=open===a.id;
        const ud = a.units_data||[];
        const minTr = a.bienvenida+a.pag_clase*7.5+a.conclusion+a.complementarios;
        const minU = ud.reduce((s,u)=>s+u.orient+u.videoClase+u.infografia+u.biblio+u.formativo+u.sumativo,0);
        return (
          <div key={a.id} style={{background:"#fff",borderRadius:10,border:"1px solid #EBECF0",marginBottom:8,overflow:"hidden"}}>
            <div onClick={()=>setOpen(isO?null:a.id)} style={{display:"grid",gridTemplateColumns:"36px 1fr 90px 100px 70px",gap:6,padding:"10px 16px",alignItems:"center",cursor:"pointer",background:isO?"#FAFBFF":"#fff"}}>
              <Pill prog={a.prog} />
              <div>
                <div style={{fontSize:13,fontWeight:500,color:"#2A2A2A"}}>{a.nombre}</div>
                <div style={{fontSize:10,color:"#999"}}>C{a.ciclo} · {a.uni}u · {a.temas}t · {a.h_async+a.h_apoyo}h async · {a.doc}</div>
              </div>
              <div style={{textAlign:"right"}}><span style={{fontSize:14,fontWeight:700}}>{tm.toFixed(0)}</span><span style={{fontSize:10,color:"#999"}}> / {tg2}</span></div>
              <Bar p={p} />
              <Badge p={p} />
            </div>
            {isO && (
              <div style={{padding:"0 16px 16px",background:"#FAFBFF"}}>
                <div style={{display:"flex",gap:14,marginBottom:10,fontSize:12,flexWrap:"wrap"}}>
                  <label style={{display:"flex",alignItems:"center",gap:4,color:"#666"}}>Unidades: <N v={a.uni} w={36} onChange={v=>upd(a.id,x=>{const d=v-x.uni;if(d>0)for(let i=0;i<d;i++)x.units_data.push({orient:2,videoClase:12,infografia:12,biblio:0,formativo:15,sumativo:60});if(d<0)x.units_data=x.units_data.slice(0,v);x.uni=v;return x;})} /></label>
                  <label style={{display:"flex",alignItems:"center",gap:4,color:"#666"}}>Temas: <N v={a.temas} w={36} onChange={v=>upd(a.id,x=>{x.temas=v;return x;})} /></label>
                  <label style={{display:"flex",alignItems:"center",gap:4,color:"#666"}}>H async: <N v={a.h_async} w={40} onChange={v=>upd(a.id,x=>{x.h_async=v;return x;})} /></label>
                  <label style={{display:"flex",alignItems:"center",gap:4,color:"#666"}}>H apoyo: <N v={a.h_apoyo} w={40} onChange={v=>upd(a.id,x=>{x.h_apoyo=v;return x;})} /></label>
                </div>
                {/* Generales */}
                <div style={{fontSize:11,fontWeight:600,color:"#0090F8",marginBottom:4,borderBottom:"1px solid #E0E7F0",paddingBottom:3}}>Recursos generales</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 56px 65px",gap:"2px 8px",fontSize:12,marginBottom:6,alignItems:"center"}}>
                  <span style={{color:"#666"}}>Video de bienvenida</span><N v={a.bienvenida} w={48} onChange={v=>upd(a.id,x=>{x.bienvenida=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{a.bienvenida} min</span>
                  <span style={{color:"#666"}}>Clase escrita (páginas)</span><N v={a.pag_clase} w={48} accent onChange={v=>upd(a.id,x=>{x.pag_clase=v;return x;})} /><span style={{textAlign:"right",fontWeight:600,color:"#0090F8"}}>{(a.pag_clase*7.5).toFixed(0)} min</span>
                  <span style={{color:"#666"}}>Conclusión y cierre</span><N v={a.conclusion} w={48} onChange={v=>upd(a.id,x=>{x.conclusion=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{a.conclusion} min</span>
                  <span style={{color:"#666"}}>Recursos complementarios</span><N v={a.complementarios} w={48} onChange={v=>upd(a.id,x=>{x.complementarios=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{a.complementarios} min</span>
                  <span style={{fontWeight:600,color:"#444"}}>Subtotal</span><span></span><span style={{textAlign:"right",fontWeight:700}}>{minTr.toFixed(0)} min</span>
                </div>
                {/* Unidades */}
                {ud.map((u,i) => {
                  const uT=u.orient+u.videoClase+u.infografia+u.biblio+u.formativo+u.sumativo;
                  return (
                    <div key={i}>
                      <div style={{fontSize:11,fontWeight:600,color:"#2A2A2A",marginBottom:3,marginTop:5,borderBottom:"1px solid #eee",paddingBottom:2}}>Unidad {i+1} <span style={{fontWeight:400,color:"#aaa",marginLeft:6}}>{uT} min</span></div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 56px 65px",gap:"2px 8px",fontSize:12,alignItems:"center",marginBottom:3}}>
                        <span style={{color:"#666"}}>Orientaciones</span><N v={u.orient} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].orient=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.orient} min</span>
                        <span style={{color:"#666"}}>Video clase</span><N v={u.videoClase} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].videoClase=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.videoClase} min</span>
                        <span style={{color:"#666"}}>Infografía</span><N v={u.infografia} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].infografia=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.infografia} min</span>
                        <span style={{color:"#666"}}>Bibliografía</span><N v={u.biblio} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].biblio=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.biblio} min</span>
                        <span style={{color:"#666"}}>Formativo</span><N v={u.formativo} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].formativo=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.formativo} min</span>
                        <span style={{color:"#666"}}>Sumativo</span><N v={u.sumativo} w={48} onChange={v=>upd(a.id,x=>{x.units_data[i].sumativo=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{u.sumativo} min</span>
                      </div>
                    </div>
                  );
                })}
                {/* Examen */}
                <div style={{fontSize:11,fontWeight:600,color:"#2A2A2A",marginTop:6,marginBottom:3,borderBottom:"1px solid #eee",paddingBottom:2}}>Examen final</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 56px 65px",gap:"2px 8px",fontSize:12,alignItems:"center",marginBottom:8}}>
                  <span style={{color:"#666"}}>Examen</span><N v={a.examen} w={48} onChange={v=>upd(a.id,x=>{x.examen=v;return x;})} /><span style={{textAlign:"right",color:"#888"}}>{a.examen} min</span>
                </div>
                {/* Total */}
                <div style={{background:"#fff",border:"1px solid #EBECF0",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,fontSize:12}}>
                  <span><span style={{color:"#888"}}>General:</span> <b>{minTr.toFixed(0)}</b> + <span style={{color:"#888"}}>Unidades:</span> <b>{minU}</b> + <span style={{color:"#888"}}>Examen:</span> <b>{a.examen}</b></span>
                  <span style={{fontSize:14,fontWeight:700}}>{tm.toFixed(0)} <span style={{fontWeight:400,color:"#888",fontSize:12}}>/ {tg2} min</span></span>
                  <span><b>{(tm/HP).toFixed(1)}</b> <span style={{color:"#888"}}>hrs ped</span></span>
                  <Badge p={p} />
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* ═══ TAB 2: PÁGINAS ═══ */}
      {tab===2 && (
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #EBECF0",overflow:"hidden"}}>
          <div style={{padding:"14px 16px",background:"#F8F9FA",borderBottom:"1px solid #EBECF0"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#2A2A2A"}}>Páginas de desarrollo — Contenidista</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>CC editable. VC = 12 pág × unidades. Inf = 2.5 pág × unidades.</div>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#F8F9FA"}}>
                {["","Asignatura","U","T","Pág CC","Pág VC","Pág Inf","Total","Pág/U","Pág/T","Estado"].map((h,i)=>(
                  <th key={i} style={{padding:"8px 8px",textAlign:i<2?"left":"right",fontWeight:600,color:i===4?"#0090F8":"#666",fontSize:10,borderBottom:"1px solid #EBECF0"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {filtered.map(a => {
                  const pVC=12*a.uni, pInf=2.5*a.uni, pTot=a.pag_clase+pVC+pInf;
                  return (
                    <tr key={a.id} style={{borderBottom:"1px solid #F5F5F5"}}>
                      <td style={{padding:"6px 8px"}}><Pill prog={a.prog}/></td>
                      <td style={{padding:"6px 8px",minWidth:140}}><div style={{fontWeight:500,fontSize:12}}>{a.nombre}</div><div style={{fontSize:10,color:"#aaa"}}>C{a.ciclo} · {a.doc}</div></td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{a.uni}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{a.temas}</td>
                      <td style={{padding:"4px 4px"}}><N v={a.pag_clase} w={48} accent onChange={v=>upd(a.id,x=>{x.pag_clase=v;return x;})} /></td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{pVC}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{pInf}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",fontWeight:700}}>{pTot.toFixed(0)}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{a.uni>0?((a.pag_clase/a.uni)+12+2.5).toFixed(0):"-"}</td>
                      <td style={{textAlign:"right",padding:"6px 8px",color:"#666"}}>{(()=>{const pu=a.uni>0?(a.pag_clase/a.uni)+14.5:0;const tu=a.uni>0?a.temas/a.uni:0;return tu>0?((pu/tu).toFixed(1)):"-";})()}</td>
                      <td style={{textAlign:"center",padding:"6px 4px"}}><Badge p={pct(a)}/></td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr style={{background:"#F8F9FA",fontWeight:700,fontSize:12}}>
                <td colSpan={4} style={{padding:"10px 8px"}}>Totales</td>
                <td style={{textAlign:"right",padding:"10px 8px",color:"#0090F8"}}>{filtered.reduce((s,a)=>s+a.pag_clase,0)}</td>
                <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+12*a.uni,0)}</td>
                <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+2.5*a.uni,0)}</td>
                <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+a.pag_clase+12*a.uni+2.5*a.uni,0).toFixed(0)}</td>
                <td colSpan={3}></td>
              </tr></tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ═══ TAB 3: COSTOS ═══ */}
      {tab===3 && (
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #EBECF0",overflow:"hidden"}}>
          <div style={{padding:"14px 16px",background:"#F8F9FA",borderBottom:"1px solid #EBECF0"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#2A2A2A"}}>Proyección de costos</div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>Páginas totales × USD $1.00 / página</div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#F8F9FA"}}>
              {["","Asignatura","CC","VC","Inf","Total","USD"].map((h,i)=>(
                <th key={i} style={{padding:"8px 8px",textAlign:i<2?"left":"right",fontWeight:600,color:i===6?"#0090F8":"#666",fontSize:10,borderBottom:"1px solid #EBECF0"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map(a => {
                const pVC=12*a.uni, pInf=2.5*a.uni, pTot=a.pag_clase+pVC+pInf;
                return (
                  <tr key={a.id} style={{borderBottom:"1px solid #F5F5F5"}}>
                    <td style={{padding:"6px 8px"}}><Pill prog={a.prog}/></td>
                    <td style={{padding:"6px 8px"}}><span style={{fontWeight:500,fontSize:12}}>{a.nombre}</span><br/><span style={{fontSize:10,color:"#aaa"}}>C{a.ciclo} · {a.uni}u</span></td>
                    <td style={{textAlign:"right",padding:"6px 8px"}}>{a.pag_clase}</td>
                    <td style={{textAlign:"right",padding:"6px 8px"}}>{pVC}</td>
                    <td style={{textAlign:"right",padding:"6px 8px"}}>{pInf}</td>
                    <td style={{textAlign:"right",padding:"6px 8px",fontWeight:700}}>{pTot.toFixed(0)}</td>
                    <td style={{textAlign:"right",padding:"6px 8px",fontWeight:700,color:"#0090F8"}}>${pTot.toFixed(0)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr style={{background:"#F8F9FA",fontWeight:700}}>
              <td colSpan={2} style={{padding:"10px 8px"}}>Total</td>
              <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+a.pag_clase,0)}</td>
              <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+12*a.uni,0)}</td>
              <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+2.5*a.uni,0)}</td>
              <td style={{textAlign:"right",padding:"10px 8px"}}>{filtered.reduce((s,a)=>s+a.pag_clase+12*a.uni+2.5*a.uni,0).toFixed(0)}</td>
              <td style={{textAlign:"right",padding:"10px 8px",color:"#0090F8",fontSize:15}}>${filtered.reduce((s,a)=>s+a.pag_clase+12*a.uni+2.5*a.uni,0).toFixed(0)}</td>
            </tr></tfoot>
          </table>
          <div style={{padding:16,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
            {[...new Set(filtered.map(a=>a.prog))].map(prog => {
              const pd=filtered.filter(a=>a.prog===prog);
              const tp=pd.reduce((s,a)=>s+a.pag_clase+12*a.uni+2.5*a.uni,0);
              return (<div key={prog} style={{background:"#F8F9FA",borderRadius:8,padding:14,borderLeft:`3px solid ${PCOL[prog]}`}}>
                <div style={{fontSize:11,fontWeight:700,color:PCOL[prog]}}>{prog}</div>
                <div style={{fontSize:22,fontWeight:700,color:"#2A2A2A"}}>${tp.toFixed(0)}</div>
                <div style={{fontSize:10,color:"#999"}}>{pd.length} asig · {tp.toFixed(0)} pág</div>
              </div>);
            })}
            <div style={{background:"#2A2A2A",borderRadius:8,padding:14,borderLeft:"3px solid #0090F8"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#0090F8"}}>TOTAL</div>
              <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>${filtered.reduce((s,a)=>s+a.pag_clase+12*a.uni+2.5*a.uni,0).toFixed(0)}</div>
              <div style={{fontSize:10,color:"#888"}}>{filtered.length} asig</div>
            </div>
          </div>
        </div>
      )}

      <div style={{marginTop:24,textAlign:"center",fontSize:10,color:"#ccc"}}>HACKEA · info@hackea.pro</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
